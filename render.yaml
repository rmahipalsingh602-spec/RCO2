services:
  - type: web
    name: rco2-api
    runtime: python
    plan: free
    branch: main
    autoDeploy: true
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: DATABASE_URL
        fromDatabase:
          name: rco2-postgres
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: FRONTEND_ORIGIN_REGEX
        sync: false
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAME_SITE
        value: "none"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: MARKET_PRICE_INR
        value: "800"

databases:
  - name: rco2-postgres
    databaseName: rco2
    user: rco2
    plan: free
